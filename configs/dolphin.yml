# Network config
audionet:
  audionet_name: Dolphin
  audionet_config:
    num_stages: &var_model_num_stages 4 # R
    sample_rate: 16000
    vpre_channels: 3872
    vmid_channels: 512
    vin_channels: 64
    vout_channels: 64
    is_train: true
    video_encoder_pretrained_hf:
        model_id: "JusperLee/Dolphin"
        revision: "main"
        filename: "model.safetensors"
        strict: false

    module_audio_enc:
        in_channels: 1
        out_channels: &var_model_audio_enc_out_channels 256
        kernel_size: &var_model_audio_enc_kernel_size 16 # L
        stride: &var_model_audio_enc_stride 4 # S
        groups: 1
        bias: false

    module_feature_projector:
        num_channels: *var_model_audio_enc_out_channels 
        in_channels: *var_model_audio_enc_out_channels
        out_channels: &feature_projector_out_channels 128 # F
        kernel_size: 1
        bias: false

    module_separator:
        num_stages: *var_model_num_stages
        relative_positional_encoding:
            in_channels: *feature_projector_out_channels
            num_heads: 8
            maxlen: 2000
            embed_v: false
        enc_stage:
            global_blocks:
                in_channels: *feature_projector_out_channels
                num_mha_heads: 8
                dropout_rate: 0.05
            local_blocks:
                in_channels: *feature_projector_out_channels
                kernel_size: 65
                dropout_rate: 0.05
            down_conv_layer:
                in_channels: *feature_projector_out_channels
                samp_kernel_size: &var_model_samp_kernel_size 5
        simple_fusion:
            out_channels: *feature_projector_out_channels
        dec_stage:
            global_blocks:
                in_channels: *feature_projector_out_channels
                num_mha_heads: 8
                dropout_rate: 0.05
            local_blocks:
                in_channels: *feature_projector_out_channels
                kernel_size: 65
                dropout_rate: 0.05
            spk_attention:
                in_channels: *feature_projector_out_channels
                num_mha_heads: 8
                dropout_rate: 0.05
        
    module_output_layer:
        in_channels: *var_model_audio_enc_out_channels
        out_channels: *feature_projector_out_channels

    module_audio_dec:
        in_channels: *var_model_audio_enc_out_channels
        out_channels: 1
        kernel_size: *var_model_audio_enc_kernel_size
        stride: *var_model_audio_enc_stride
        bias: false

    video_encoder_params:
        layers: [
                'residual',
                'compress_space',
                'consecutive_residual',
                'compress_space',
                'consecutive_residual',
                'linear_attend_space',
                'compress_space',
                'consecutive_residual',
                'attend_space'
                ]
        image_size: 88
        in_channel: 1
        init_channel: 4
        max_dim: 32
        input_conv_kernel_size: [7, 7, 7]
        output_conv_kernel_size: [3, 3, 3]
        residual_conv_kernel_size: 3
        pad_mode: "constant"
        attn_dim_head: 32
        attn_heads: 8
        attn_dropout: 0.
        flash_attn: True
        linear_attn_dim_head: 8
        linear_attn_heads: 16
        num_quantizers: 1
        codebook_size: 256
        codebook_dim: 64
        commitment_cost: 1.0
        distill_cost: 1.0

# Loss config
loss:
  train:
    loss_func: MultiDecoder_PITLossWrapper
    sdr_type: MultistageLoss
    stftconfig:
      frame_length: 512
      frame_shift: 128
      window: "hann"
      num_stages: 4
      scale_inv: false
      mel_opt: false
    config:
      pit_from: pw_mtx
      threshold_byloss: false
  val:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_sisdr
    config:
      pit_from: pw_mtx
      threshold_byloss: false

# Training config
training:
  system: AudioVisualLightningModuleAE
  gpus: [1]
  parallel: ddp
  epochs: 500
  gradient_clip_val: 5.0
  sync_batchnorm: true
  early_stop:
    monitor: val_loss/dataloader_idx_0
    mode: min
    patience: 20
    verbose: true

# Optimizer config
optimizer:
  optim_name: adam
  lr: 0.002
  weight_decay: 0.0

# Scheduler config
scheduler:
  sche_name: ReduceLROnPlateau
  sche_config:
    patience: 10
    factor: 0.5

# Data config
datamodule:
  data_name: AVSpeechDataModule
  data_config:
    train_dir: DataPreProcess/LRS2/tr
    valid_dir: DataPreProcess/LRS2/cv
    test_dir: DataPreProcess/LRS2/tt
    n_src: 1
    sample_rate: 16000
    segment: 2.0
    normalize_audio: false
    batch_size: 4
    num_workers: 8
    pin_memory: true
    persistent_workers: false

exp:
  exp_name: LRS2-final-Dolphin-1gpu-batch4

logging:
  use_swanlab: true
  swanlab:
    project: "test-dolpin"
    workspace: "jusperlee"
    offline: false

